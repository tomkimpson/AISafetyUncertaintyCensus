name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install from lockfile
        run: uv sync --extra dev --python ${{ matrix.python-version }}
      - name: Run tests
        run: uv run pytest
      - name: Paper-number drift guard
        run: uv run python scripts/check_paper_numbers.py
      - name: Derived-data checksums
        run: cd data/derived && shasum -c CHECKSUMS.sha256

  # Source provenance needs network; run it but don't fail the build if a vendor
  # host is briefly unreachable (the archival record is the committed MANIFEST +
  # Wayback URLs, re-verified here as a health check).
  provenance:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Verify source provenance (stdlib only)
        run: python scripts/verify_sources.py --no-download
